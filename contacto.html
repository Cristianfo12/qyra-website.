<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto | QYRA Ingeniería</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

    <header class="hero-service" style="background-image: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('assets/img/digital-bg.jpg');">
        <div class="container">
            <h1>Solicitar Servicio</h1>
            <p>Cuéntanos tu necesidad y un ingeniero se pondrá en contacto contigo.</p>
            <a href="index.html" class="btn-volver">← Volver al Inicio</a>
        </div>
    </header>

    <main class="container section-padding">
        <div class="form-container">
            <form action="https://formspree.io/f/mwvaqoaw" method="POST" class="formulario-qyra">
                
                <div class="grupo-input">
                    <label for="nombre">Nombre Completo / Empresa</label>
                    <input type="text" id="nombre" name="nombre" placeholder="Ej: Cristian Florez" required>
                </div>

                <div class="grupo-input">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" name="email" placeholder="correo@ejemplo.com" required>
                </div>

                <div class="grupo-input">
                    <label for="servicio">Servicio de Interés</label>
                    <select id="servicio" name="servicio" required>
                         <option value="Potenciación" selected>Potenciación & Respaldo</option>
                    </select>
                </div>

                <div class="grupo-input">
                    <label for="mensaje">Descripción de la falla</label>
                    <textarea id="mensaje" name="mensaje" rows="5" placeholder="Cuéntanos: ¿Qué le sucede a tu equipo? (Ej: No enciende, se calienta, pantalla azul...)" required></textarea>
                </div>

                <button type="submit" class="btn-enviar">Enviar Solicitud »</button>
            </form>
        </div>
    </main>

</body>
</html>
